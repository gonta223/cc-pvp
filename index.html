<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>/pvp - Claude Code Battle Arena</title>
<meta name="description" content="Claude Codeユーザー同士のオンライン対戦ゲーム。ボタン1つで即マッチ＆バトル！">
<meta property="og:title" content="/pvp - Claude Code Battle Arena">
<meta property="og:description" content="Claude Code で /pvp → 即マッチ → リアルタイム対戦！URLシェアでフレンド対戦も。">
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--p1:#3b82f6;--p2:#f97316;--accent:#6366f1;--bg:#0a0a0f;--card:#0f172a;--border:#1e293b;--text:#e2e8f0;--dim:#64748b}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
.px{font-family:'Press Start 2P',cursive}

/* LOBBY */
#lobby{background:radial-gradient(ellipse at center,#1a1a2e 0%,var(--bg) 70%);gap:16px}
.logo{font-size:clamp(32px,6vw,64px);color:#fff;text-shadow:0 0 20px rgba(99,102,241,.8),0 0 50px rgba(99,102,241,.3);animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{to{text-shadow:0 0 30px rgba(99,102,241,1),0 0 60px rgba(99,102,241,.5),0 0 90px rgba(99,102,241,.2)}}
.logo-sub{font-size:clamp(9px,1.6vw,14px);color:var(--accent);letter-spacing:4px;margin-bottom:20px}
.matchup{display:flex;align-items:center;gap:20px;margin-bottom:30px}
.mc{font-size:clamp(32px,5vw,56px);animation:fl 3s ease-in-out infinite}
.mc:nth-child(3){animation-delay:.5s}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.vs{font-size:clamp(24px,4vw,44px);color:#ef4444;text-shadow:0 0 18px rgba(239,68,68,.4)}

.btn{font-family:'Noto Sans JP',sans-serif;padding:16px 36px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;border:2px solid}
.btn-big{padding:20px 48px;font-size:20px;background:linear-gradient(135deg,rgba(99,102,241,.25),rgba(139,92,246,.25));border-color:var(--accent);color:#fff;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}50%{box-shadow:0 0 0 12px rgba(99,102,241,0)}}
.btn-big:hover{background:linear-gradient(135deg,rgba(99,102,241,.4),rgba(139,92,246,.4));transform:translateY(-3px);box-shadow:0 8px 30px rgba(99,102,241,.3)}
.secondary-btns{display:flex;gap:12px;margin-top:8px}
.btn-sm{padding:10px 20px;font-size:13px;background:transparent;border-color:var(--border);color:var(--dim)}
.btn-sm:hover{border-color:var(--dim);color:var(--text)}
.join-row{display:none;gap:8px;align-items:center;margin-top:8px}
.join-row.show{display:flex}
.join-row input{font-family:'Press Start 2P',cursive;font-size:16px;padding:10px 14px;width:160px;text-align:center;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);letter-spacing:6px;text-transform:uppercase}
.join-row input:focus{outline:none;border-color:var(--accent)}
.msg{font-size:13px;min-height:20px;margin-top:4px}
.msg.err{color:#ef4444}

/* SEARCHING */
#searching{background:radial-gradient(ellipse at center,#1a1a2e 0%,var(--bg) 70%);gap:24px}
.search-spinner{width:60px;height:60px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.search-text{font-size:clamp(14px,2vw,20px);color:var(--text)}
.search-sub{font-size:12px;color:var(--dim)}
.online-count{font-size:11px;color:var(--dim);margin-top:4px}

/* WAITING (room code) */
#waiting{background:radial-gradient(ellipse at center,#1a1a2e 0%,var(--bg) 70%);gap:20px}
.room-code{font-size:clamp(36px,7vw,72px);color:#fff;letter-spacing:12px;text-shadow:0 0 20px rgba(99,102,241,.6)}
.share-url{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--dim);max-width:90vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:all .2s}
.share-url:hover{border-color:var(--accent)}.share-url.copied{border-color:#22c55e;color:#22c55e}
.dots::after{content:'';animation:dots 1.5s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.btn-cancel{background:transparent;border-color:var(--border);color:var(--dim);padding:10px 20px;font-size:13px}

/* BATTLE */
#battle{background:radial-gradient(ellipse at top,#1a1a2e 0%,var(--bg) 70%)}
.b-top{width:100%;padding:8px 16px;display:flex;justify-content:center}
.turn-badge{font-size:11px;padding:4px 14px;border-radius:20px;border:1px solid var(--border);color:var(--dim)}
.stage{flex:1;width:100%;display:flex;align-items:center;justify-content:space-around;padding:10px 20px;position:relative}
.fighter{display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .3s}
.fighter.shake{animation:shake .4s ease-in-out}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-14px) rotate(-2deg)}40%{transform:translateX(11px) rotate(1deg)}60%{transform:translateX(-7px)}80%{transform:translateX(4px)}}
.sprite{width:clamp(70px,14vw,120px);height:clamp(70px,14vw,120px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(34px,6vw,58px)}
.sprite.p1{background:radial-gradient(circle,rgba(59,130,246,.25),transparent);box-shadow:0 0 30px rgba(59,130,246,.3)}
.sprite.p2{background:radial-gradient(circle,rgba(249,115,22,.25),transparent);box-shadow:0 0 30px rgba(249,115,22,.3)}
.f-name{font-weight:900;font-size:clamp(12px,1.8vw,17px);letter-spacing:1px}
.bars{width:clamp(100px,18vw,200px)}
.bar-row{margin-bottom:4px}
.bar-h{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:2px}
.bar-o{width:100%;height:12px;background:var(--border);border-radius:6px;overflow:hidden}
.bar-i{height:100%;border-radius:6px;transition:width .5s ease-out,background .3s}
.bhp{background:linear-gradient(90deg,#22c55e,#4ade80)}.bhp.w{background:linear-gradient(90deg,#eab308,#facc15)}.bhp.c{background:linear-gradient(90deg,#ef4444,#f87171)}
.bmp{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.vs-m{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,4vw,36px);color:rgba(255,255,255,.06)}
.timer-area{width:100%;padding:0 20px;display:flex;align-items:center;gap:10px}
.timer-o{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.timer-i{height:100%;background:var(--accent);border-radius:3px;transition:width .3s linear}
.timer-i.urg{background:#ef4444}
.timer-t{font-size:12px;color:var(--dim);min-width:28px;text-align:right}
.dialog{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;margin:8px 16px;min-height:44px;display:flex;align-items:center;font-size:clamp(12px,1.4vw,15px);line-height:1.5}
.opp-st{text-align:center;font-size:12px;color:var(--dim);padding:4px;min-height:24px}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 14px 16px;width:100%;background:rgba(15,23,42,.9);border-top:1px solid var(--border)}
.act{padding:13px 10px;border:2px solid var(--border);border-radius:10px;background:rgba(30,41,59,.7);color:var(--text);font-size:clamp(13px,1.4vw,15px);font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:6px}
.act:hover:not(:disabled):not(.locked){border-color:var(--accent);background:rgba(99,102,241,.12);transform:translateY(-2px)}
.act:disabled{opacity:.35;cursor:not-allowed}
.act.locked{border-color:#22c55e;background:rgba(34,197,94,.12);color:#4ade80}
.act .k{font-family:'Press Start 2P',cursive;font-size:9px;background:var(--border);padding:2px 5px;border-radius:3px}
.act .co{font-size:10px;color:#60a5fa;margin-left:auto}

/* Damage */
.dmg{position:absolute;font-family:'Press Start 2P',cursive;font-size:24px;font-weight:900;pointer-events:none;animation:du .9s ease-out forwards;z-index:100}
.dmg.red{color:#ef4444}.dmg.grn{color:#22c55e}.dmg.gry{color:#64748b}.dmg.gld{color:#fbbf24;font-size:30px}
@keyframes du{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-35px) scale(1.15)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}
.flash{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.12);pointer-events:none;animation:fo .15s ease-out forwards;z-index:50}
@keyframes fo{to{opacity:0}}

/* Reveal */
.reveal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;animation:fi .3s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.rv-title{font-size:clamp(16px,3vw,28px);margin-bottom:30px;color:var(--dim)}
.rv-cards{display:flex;gap:clamp(16px,6vw,60px);align-items:center;margin-bottom:20px}
.rv-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:20px 24px;text-align:center;min-width:110px;animation:ci .4s ease-out backwards}
.rv-card:nth-child(3){animation-delay:.2s}
@keyframes ci{from{opacity:0;transform:scale(.7) rotateY(90deg)}to{opacity:1;transform:scale(1) rotateY(0)}}
.rv-card .who{font-size:11px;color:var(--dim);margin-bottom:6px}
.rv-card .what{font-size:28px;margin-bottom:4px}
.rv-card .nm{font-size:13px;font-weight:700}
.rv-vs{font-size:24px;color:rgba(255,255,255,.12)}
.rv-res{font-size:clamp(13px,1.6vw,17px);text-align:center;line-height:1.8}

/* RESULT */
#result{background:radial-gradient(ellipse at center,#1a1a2e 0%,var(--bg) 70%);gap:16px;text-align:center}
.r-title{font-size:clamp(24px,5vw,48px)}
.r-title.win{color:#fbbf24;text-shadow:0 0 30px rgba(251,191,36,.6);animation:glow 1.5s ease-in-out infinite alternate}
.r-title.lose{color:#ef4444;text-shadow:0 0 30px rgba(239,68,68,.5)}
.r-msg{font-size:clamp(14px,2vw,18px);color:var(--dim);max-width:400px;line-height:1.6}
.r-stats{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 32px;font-size:14px;line-height:2;text-align:left}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-g{padding:14px 28px;font-size:15px;border-radius:10px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;border:2px solid}
.btn-g.pri{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--text)}
.btn-g.pri:hover{background:rgba(99,102,241,.3);transform:translateY(-2px)}
.btn-g.sec{background:transparent;border-color:var(--border);color:var(--dim)}
.btn-g.sec:hover{border-color:var(--dim);color:var(--text)}
.confetti{position:fixed;width:10px;height:10px;top:-10px;z-index:300;animation:cf linear forwards}
@keyframes cf{to{top:110vh;transform:rotate(720deg)}}

/* Status */
.conn-st{position:fixed;top:10px;right:14px;font-size:10px;padding:3px 10px;border-radius:16px;z-index:400;border:1px solid}
.conn-st.ok{color:#22c55e;border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.06)}
.conn-st.ng{color:#ef4444;border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.06)}

@media(max-width:500px){.acts{gap:4px;padding:6px 8px 12px}.act{padding:10px 6px;font-size:12px}.bars{width:clamp(80px,22vw,150px)}}
</style>
</head>
<body>

<div class="conn-st" id="conn" style="display:none"></div>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="px logo">/pvp</div>
  <div class="px logo-sub">BATTLE ARENA</div>
  <div class="matchup"><div class="mc">🧑‍💻</div><div class="px vs">VS</div><div class="mc">👨‍💻</div></div>
  <button class="btn btn-big" onclick="quickMatch()">⚡ すぐ対戦</button>
  <div class="secondary-btns">
    <button class="btn btn-sm" onclick="createRoom()">🔑 部屋を作る</button>
    <button class="btn btn-sm" onclick="toggleJoin()">🚪 コードで入る</button>
  </div>
  <div class="join-row" id="join-row">
    <input type="text" id="room-input" placeholder="ABCD" maxlength="4" autocomplete="off" spellcheck="false">
    <button class="btn btn-sm" style="border-color:var(--accent);color:var(--text)" onclick="joinRoom()">参戦！</button>
  </div>
  <div class="msg" id="lobby-msg"></div>
</div>

<!-- SEARCHING -->
<div id="searching" class="screen">
  <div class="search-spinner"></div>
  <div class="search-text">対戦相手を探しています<span class="dots"></span></div>
  <div class="search-sub" id="search-sub">ランダムマッチング中</div>
  <button class="btn btn-cancel" onclick="cancelSearch()">キャンセル</button>
</div>

<!-- WAITING (room code) -->
<div id="waiting" class="screen">
  <div style="font-size:14px;color:var(--dim)">ルームコード</div>
  <div class="px room-code" id="room-code-disp">----</div>
  <div class="share-url" id="share-url" onclick="copyUrl()">URLをコピー</div>
  <div>対戦相手を待っています<span class="dots"></span></div>
  <button class="btn btn-cancel" onclick="cancelWait()">キャンセル</button>
</div>

<!-- BATTLE -->
<div id="battle" class="screen">
  <div class="b-top"><div class="px turn-badge" id="turn-badge">TURN 1</div></div>
  <div class="stage">
    <div class="px vs-m">VS</div>
    <div class="fighter" id="f1">
      <div class="sprite p1" id="s1">🧑‍💻</div>
      <div class="f-name" style="color:var(--p1)" id="n1">あなた</div>
      <div class="bars">
        <div class="bar-row"><div class="bar-h"><span>HP</span><span id="hp1t">100/100</span></div><div class="bar-o"><div class="bar-i bhp" id="hp1b" style="width:100%"></div></div></div>
        <div class="bar-row"><div class="bar-h"><span>MP</span><span id="mp1t">50/50</span></div><div class="bar-o"><div class="bar-i bmp" id="mp1b" style="width:100%"></div></div></div>
      </div>
    </div>
    <div class="fighter" id="f2">
      <div class="sprite p2" id="s2">👨‍💻</div>
      <div class="f-name" style="color:var(--p2)" id="n2">相手</div>
      <div class="bars">
        <div class="bar-row"><div class="bar-h"><span>HP</span><span id="hp2t">100/100</span></div><div class="bar-o"><div class="bar-i bhp" id="hp2b" style="width:100%"></div></div></div>
        <div class="bar-row"><div class="bar-h"><span>MP</span><span id="mp2t">50/50</span></div><div class="bar-o"><div class="bar-i bmp" id="mp2b" style="width:100%"></div></div></div>
      </div>
    </div>
  </div>
  <div class="timer-area"><div class="timer-o"><div class="timer-i" id="timer-bar" style="width:100%"></div></div><div class="px timer-t" id="timer-t">15</div></div>
  <div class="dialog" id="dialog">アクションを選べ！</div>
  <div class="opp-st" id="opp-st"></div>
  <div class="acts" id="acts">
    <button class="act" onclick="pick('attack')"><span class="k">1</span>⚔️ こうげき</button>
    <button class="act" onclick="pick('heavy')"><span class="k">2</span>💥 強攻撃<span class="co">MP15</span></button>
    <button class="act" onclick="pick('defend')"><span class="k">3</span>🛡️ ぼうぎょ</button>
    <button class="act" onclick="pick('heal')"><span class="k">4</span>💊 かいふく<span class="co">MP20</span></button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="px r-title" id="r-title">WIN!</div>
  <div class="r-msg" id="r-msg"></div>
  <div class="r-stats" id="r-stats"></div>
  <div class="btn-group">
    <button class="btn-g pri" onclick="rematch()">🔄 リマッチ</button>
    <button class="btn-g pri" onclick="shareResult()">📤 シェア</button>
    <button class="btn-g sec" onclick="backToLobby()">🏠 ロビー</button>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ===== CONFIG =====
const CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', TURN_TIME=15, LOBBY_SLOTS=8;
const AN={attack:'⚔️ こうげき',heavy:'💥 強攻撃',defend:'🛡️ ぼうぎょ',heal:'💊 かいふく'};
const EMOJIS=['🧑‍💻','👨‍💻','👩‍💻','🦸','🧙','🥷','🤺','🦊','🐉','🤖','👾','🎭','⚡','🔮','🐱','🐺','🦅','🎪'];

// ===== STATE =====
let peer=null,conn=null,isHost=false,roomCode='',matched=false;
let myEmoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)],oppEmoji='👨‍💻';
let game=null,myAction=null,timerIv=null,timeLeft=0;
let hostAction=null,guestAction=null;
let lobbyPeers=[];  // for cleanup
let searchAborted=false;

const $=id=>document.getElementById(id);
const show=id=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')};
function genCode(){let c='';for(let i=0;i<4;i++)c+=CHARS[Math.floor(Math.random()*CHARS.length)];return c}
function getShareUrl(){return`${location.origin}${location.pathname}?room=${roomCode}`}
function setConn(ok,t){const e=$('conn');e.style.display='block';e.className='conn-st '+(ok?'ok':'ng');e.textContent=t}

// ===== AUTO-JOIN FROM URL =====
(function(){
  const p=new URLSearchParams(location.search);
  const r=p.get('room');
  if(r&&r.length===4)setTimeout(()=>{$('room-input').value=r;toggleJoin();joinRoom()},500);
})();

// ===== QUICK MATCH (the main feature!) =====
async function quickMatch(){
  cleanup();
  matched=false;
  searchAborted=false;
  show('searching');
  $('search-sub').textContent='ランダムマッチング中';

  // Strategy: alternate between seeking (connecting to lobby slots) and hosting
  // This handles simultaneous arrival
  await doQuickMatch();
}

async function doQuickMatch(){
  if(searchAborted||matched) return;

  // Phase 1: SEEK - try connecting to each lobby slot
  $('search-sub').textContent='対戦相手を探しています...';

  const seekPeer=new Peer(undefined,{debug:0});
  lobbyPeers.push(seekPeer);

  await new Promise((res,rej)=>{seekPeer.on('open',res);seekPeer.on('error',rej)}).catch(()=>{});

  for(let i=0;i<LOBBY_SLOTS;i++){
    if(searchAborted||matched) return;
    try{
      const c=seekPeer.connect(`pvp-q-${i}`,{reliable:true});
      const ok=await Promise.race([
        new Promise(r=>{c.on('open',()=>r(true))}),
        new Promise(r=>setTimeout(()=>r(false),1500)),
        new Promise(r=>{c.on('error',()=>r(false))})
      ]);
      if(ok&&!matched&&!searchAborted){
        matched=true;isHost=false;peer=seekPeer;conn=c;
        setupConn();
        return;
      }
      if(!ok)try{c.close()}catch{}
    }catch{}
  }

  if(searchAborted||matched) return;

  // Phase 2: HOST - claim a lobby slot and wait
  $('search-sub').textContent='待機中... 相手が来るのを待っています';
  seekPeer.destroy();
  removeFromArr(lobbyPeers,seekPeer);

  for(let i=0;i<LOBBY_SLOTS;i++){
    if(searchAborted||matched) return;
    const hp=new Peer(`pvp-q-${i}`,{debug:0});
    lobbyPeers.push(hp);
    const opened=await Promise.race([
      new Promise(r=>{hp.on('open',()=>r(true))}),
      new Promise(r=>{hp.on('error',()=>r(false))}),
      new Promise(r=>setTimeout(()=>r(false),2000))
    ]);
    if(!opened){hp.destroy();removeFromArr(lobbyPeers,hp);continue;}

    // Got a slot! Wait for connection (up to 8s, then retry seek)
    const c=await Promise.race([
      new Promise(r=>{hp.on('connection',c=>{c.on('open',()=>r(c));c.on('error',()=>r(null))})}),
      new Promise(r=>setTimeout(()=>r(null),8000))
    ]);

    if(c&&!matched&&!searchAborted){
      matched=true;isHost=true;peer=hp;conn=c;
      setupConn();
      return;
    }
    hp.destroy();removeFromArr(lobbyPeers,hp);
    break; // go back to seeking
  }

  // Retry the whole cycle
  if(!searchAborted&&!matched) setTimeout(()=>doQuickMatch(),500);
}

function removeFromArr(arr,item){const i=arr.indexOf(item);if(i>-1)arr.splice(i,1);}

function cancelSearch(){
  searchAborted=true;
  cleanup();
  show('lobby');
  $('conn').style.display='none';
}

// ===== ROOM-BASED MATCHING =====
function toggleJoin(){const el=$('join-row');el.classList.toggle('show');if(el.classList.contains('show'))$('room-input').focus();}

function createRoom(){
  cleanup();
  roomCode=genCode();isHost=true;
  $('lobby-msg').textContent='';$('lobby-msg').className='msg';

  peer=new Peer('pvp-'+roomCode,{debug:0});
  peer.on('open',()=>{$('room-code-disp').textContent=roomCode;$('share-url').textContent=getShareUrl();$('share-url').classList.remove('copied');show('waiting');setConn(true,'接続OK')});
  peer.on('error',e=>{if(e.type==='unavailable-id'){roomCode=genCode();peer.destroy();createRoom();return;}$('lobby-msg').textContent='接続エラー: '+e.type;$('lobby-msg').className='msg err';setConn(false,'エラー')});
  peer.on('connection',c=>{conn=c;setupConn()});
}

function copyUrl(){navigator.clipboard.writeText(getShareUrl()).then(()=>{$('share-url').textContent='✅ コピーしました！';$('share-url').classList.add('copied');setTimeout(()=>{$('share-url').textContent=getShareUrl();$('share-url').classList.remove('copied')},2000)})}
function cancelWait(){cleanup();show('lobby');$('conn').style.display='none';}

function joinRoom(){
  cleanup();
  roomCode=$('room-input').value.toUpperCase().trim();
  if(roomCode.length!==4){$('lobby-msg').textContent='4文字のコードを入力';$('lobby-msg').className='msg err';return;}
  isHost=false;$('lobby-msg').textContent='接続中...';$('lobby-msg').className='msg';

  peer=new Peer(undefined,{debug:0});
  peer.on('open',()=>{
    conn=peer.connect('pvp-'+roomCode,{reliable:true});
    conn.on('open',()=>setupConn());
    conn.on('error',()=>{$('lobby-msg').textContent='接続失敗。コードを確認して';$('lobby-msg').className='msg err';setConn(false,'接続失敗')});
    setTimeout(()=>{if(!conn||!conn.open){$('lobby-msg').textContent='タイムアウト';$('lobby-msg').className='msg err';setConn(false,'タイムアウト')}},8000);
  });
  peer.on('error',e=>{$('lobby-msg').textContent='エラー: '+e.type;$('lobby-msg').className='msg err';setConn(false,'エラー')});
}

// ===== CONNECTION =====
function setupConn(){
  setConn(true,'対戦相手と接続！');
  conn.on('data',onMessage);
  conn.on('close',()=>{setConn(false,'切断');if(game&&game.phase==='battle')$('dialog').textContent='相手が切断しました...'});
  send({type:'hello',emoji:myEmoji});
  if(isHost)setTimeout(()=>startGame(),1200);
}

function send(d){if(conn&&conn.open)conn.send(d);}

function onMessage(d){
  switch(d.type){
    case 'hello':oppEmoji=d.emoji;break;
    case 'start':game=d.game;game.phase='battle';myAction=null;showBattle();break;
    case 'action_locked':$('opp-st').textContent='🔒 相手はアクションを選んだ！';break;
    case 'action':if(isHost)resolveActions(d.action);break;
    case 'resolve':showReveal(d);break;
    case 'rematch_req':if(confirm('リマッチ？')){send({type:'rematch_ok'});if(isHost)setTimeout(()=>startGame(),500);}break;
    case 'rematch_ok':if(isHost)setTimeout(()=>startGame(),500);break;
  }
}

function cleanup(){
  stopTimer();
  lobbyPeers.forEach(p=>{try{p.destroy()}catch{}});
  lobbyPeers=[];
  if(conn)try{conn.close()}catch{}
  if(peer)try{peer.destroy()}catch{}
  conn=null;peer=null;matched=false;
  hostAction=null;guestAction=null;myAction=null;
}

// ===== GAME =====
function startGame(){
  game={p1:{hp:100,maxHp:100,mp:50,maxMp:50},p2:{hp:100,maxHp:100,mp:50,maxMp:50},turn:1,phase:'battle'};
  myAction=null;hostAction=null;guestAction=null;
  send({type:'start',game});
  showBattle();
}

function showBattle(){
  show('battle');
  const me=isHost?game.p1:game.p2, opp=isHost?game.p2:game.p1;
  $('s1').textContent=myEmoji;$('s2').textContent=oppEmoji;
  $('n1').textContent='あなた';$('n2').textContent='相手';
  $('opp-st').textContent='';
  updateBars(me,opp);
  $('dialog').textContent=`TURN ${game.turn} - アクションを選べ！`;
  $('turn-badge').textContent=`TURN ${game.turn}`;
  enableActions(me);
  startTimer();
}

function updateBars(me,opp){
  const h1=Math.max(0,me.hp/me.maxHp*100),m1=Math.max(0,me.mp/me.maxMp*100);
  const h2=Math.max(0,opp.hp/opp.maxHp*100),m2=Math.max(0,opp.mp/opp.maxMp*100);
  $('hp1b').style.width=h1+'%';$('hp1b').className='bar-i bhp'+(h1<25?' c':h1<50?' w':'');
  $('hp1t').textContent=`${Math.max(0,me.hp)}/${me.maxHp}`;
  $('mp1b').style.width=m1+'%';$('mp1t').textContent=`${Math.max(0,me.mp)}/${me.maxMp}`;
  $('hp2b').style.width=h2+'%';$('hp2b').className='bar-i bhp'+(h2<25?' c':h2<50?' w':'');
  $('hp2t').textContent=`${Math.max(0,opp.hp)}/${opp.maxHp}`;
  $('mp2b').style.width=m2+'%';$('mp2t').textContent=`${Math.max(0,opp.mp)}/${opp.maxMp}`;
}

function enableActions(me){
  const bs=$('acts').querySelectorAll('.act');
  bs.forEach(b=>{b.disabled=false;b.classList.remove('locked')});
  if(me.mp<15)bs[1].disabled=true;
  if(me.mp<20)bs[3].disabled=true;
}

// ===== TIMER =====
function startTimer(){
  timeLeft=TURN_TIME;$('timer-bar').style.width='100%';$('timer-bar').classList.remove('urg');$('timer-t').textContent=timeLeft;
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    timeLeft-=.1;const p=Math.max(0,timeLeft/TURN_TIME*100);
    $('timer-bar').style.width=p+'%';
    if(timeLeft<=5)$('timer-bar').classList.add('urg');
    $('timer-t').textContent=Math.ceil(Math.max(0,timeLeft));
    if(timeLeft<=0){clearInterval(timerIv);if(!myAction)pick('attack')}
  },100);
}
function stopTimer(){clearInterval(timerIv)}

// ===== PICK =====
function pick(action){
  if(myAction)return;
  const me=isHost?game.p1:game.p2;
  if(action==='heavy'&&me.mp<15)return;
  if(action==='heal'&&me.mp<20)return;
  myAction=action;stopTimer();
  const bs=$('acts').querySelectorAll('.act');
  const idx=['attack','heavy','defend','heal'].indexOf(action);
  bs.forEach((b,i)=>{if(i===idx)b.classList.add('locked');else b.disabled=true});
  $('dialog').textContent=`${AN[action]} を選択！相手を待っています...`;
  if(isHost){hostAction=action;send({type:'action_locked'});if(guestAction)resolveActions(guestAction)}
  else{send({type:'action',action});send({type:'action_locked'})}
}

// ===== RESOLVE (HOST) =====
function resolveActions(guestAct){
  guestAction=guestAct;if(!hostAction)return;
  const p1a=hostAction,p2a=guestAction;
  const p1={...game.p1},p2={...game.p2};
  const r1=resolveOne(p1a,p2a,p1,p2);
  const r2=resolveOne(p2a,p1a,p2,p1);
  p1.mp=Math.min(p1.maxMp,p1.mp+5);p2.mp=Math.min(p2.maxMp,p2.mp+5);
  game.p1=p1;game.p2=p2;game.turn++;
  let winner=null;
  if(p1.hp<=0&&p2.hp<=0)winner='draw';else if(p1.hp<=0)winner='p2';else if(p2.hp<=0)winner='p1';
  const rd={type:'resolve',p1Action:p1a,p2Action:p2a,results:[r1,r2],game:{...game},winner};
  send(rd);showReveal(rd);
  hostAction=null;guestAction=null;
}

function resolveOne(myAct,oppAct,me,opp){
  const r={action:myAct,dmg:0,heal:0,crit:false};
  if(myAct==='attack'){
    let b=12+Math.floor(Math.random()*7);r.crit=Math.random()<.12;if(r.crit)b=Math.floor(b*1.8);
    if(oppAct==='defend')b=Math.floor(b*.35);opp.hp-=b;r.dmg=b;
  }else if(myAct==='heavy'){
    me.mp-=15;let b=22+Math.floor(Math.random()*9);r.crit=Math.random()<.1;if(r.crit)b=Math.floor(b*1.7);
    if(oppAct==='defend')b=Math.floor(b*.5);opp.hp-=b;r.dmg=b;
  }else if(myAct==='heal'){
    me.mp-=20;const h=22+Math.floor(Math.random()*12);const a=Math.min(h,me.maxHp-me.hp);me.hp+=a;r.heal=a;
  }
  return r;
}

// ===== REVEAL =====
function showReveal(data){
  stopTimer();myAction=null;
  const myAct=isHost?data.p1Action:data.p2Action;
  const oppAct=isHost?data.p2Action:data.p1Action;
  const myRes=isHost?data.results[0]:data.results[1];
  const oppRes=isHost?data.results[1]:data.results[0];
  let lines=[];
  if(myRes.action==='attack'||myRes.action==='heavy')lines.push(`あなたの${AN[myRes.action]} → ${myRes.dmg}ダメージ${myRes.crit?'💥CRIT!':''}${myRes.dmg<10&&(myRes.action==='attack'||myRes.action==='heavy')?' (防御された)':''}`);
  else if(myRes.action==='defend')lines.push('あなたは防御した！');
  else if(myRes.action==='heal')lines.push(`あなたはHP${myRes.heal}回復した！`);
  if(oppRes.action==='attack'||oppRes.action==='heavy')lines.push(`相手の${AN[oppRes.action]} → ${oppRes.dmg}ダメージ${oppRes.crit?'💥CRIT!':''}${oppRes.dmg<10&&(oppRes.action==='attack'||oppRes.action==='heavy')?' (防御された)':''}`);
  else if(oppRes.action==='defend')lines.push('相手は防御した！');
  else if(oppRes.action==='heal')lines.push(`相手はHP${oppRes.heal}回復した！`);

  const ov=document.createElement('div');ov.className='reveal';
  ov.innerHTML=`<div class="px rv-title">⚡ ACTIONS ⚡</div>
    <div class="rv-cards"><div class="rv-card"><div class="who">あなた</div><div class="what">${AN[myAct].split(' ')[0]}</div><div class="nm">${AN[myAct]}</div></div>
    <div class="px rv-vs">VS</div>
    <div class="rv-card"><div class="who">相手</div><div class="what">${AN[oppAct].split(' ')[0]}</div><div class="nm">${AN[oppAct]}</div></div></div>
    <div class="rv-res">${lines.join('<br>')}</div>`;
  document.body.appendChild(ov);

  game=data.game;
  const me=isHost?game.p1:game.p2,opp=isHost?game.p2:game.p1;
  setTimeout(()=>{
    updateBars(me,opp);
    if(oppRes.dmg>0){showDmg('s1',oppRes.dmg,oppRes.crit?'gld':'red');flashHit();$('f1').classList.add('shake');setTimeout(()=>$('f1').classList.remove('shake'),400)}
    if(myRes.dmg>0)showDmg('s2',myRes.dmg,myRes.crit?'gld':'red');
    if(myRes.heal>0)showDmg('s1',myRes.heal,'grn');
    if(oppRes.heal>0)showDmg('s2',oppRes.heal,'grn');
  },800);

  setTimeout(()=>{
    ov.remove();
    if(data.winner)showResult(data.winner);
    else{$('opp-st').textContent='';$('dialog').textContent=`TURN ${game.turn} - アクションを選べ！`;$('turn-badge').textContent=`TURN ${game.turn}`;enableActions(me);startTimer()}
  },3000);
}

function showDmg(tid,amt,cls){
  const el=$(tid),rect=el.getBoundingClientRect(),d=document.createElement('div');
  d.className=`dmg ${cls}`;d.textContent=cls==='grn'?`+${amt}`:cls==='gry'?'BLOCK!':`-${amt}`;
  d.style.left=(rect.left+rect.width/2-20)+'px';d.style.top=rect.top+'px';
  document.body.appendChild(d);setTimeout(()=>d.remove(),900);
}
function flashHit(){const f=document.createElement('div');f.className='flash';document.body.appendChild(f);setTimeout(()=>f.remove(),150)}

// ===== RESULT =====
function showResult(winner){
  show('result');
  const iWin=(isHost&&winner==='p1')||(!isHost&&winner==='p2');
  const isDraw=winner==='draw';
  const t=$('r-title');
  if(isDraw){t.textContent='🤝 DRAW!';t.className='px r-title'}
  else if(iWin){t.textContent='🏆 YOU WIN!';t.className='px r-title win';spawnConfetti()}
  else{t.textContent='💀 YOU LOSE';t.className='px r-title lose'}
  $('r-msg').textContent=isDraw?'引き分け！お互い力尽きた...':iWin?'勝利！見事な戦い！':'敗北...リベンジだ！';
  $('r-stats').innerHTML=`📊 バトルレポート<br>━━━━━━━━━━━━━━<br>🔄 ターン数: ${game.turn-1}<br>❤️ 残りHP: ${Math.max(0,isHost?game.p1.hp:game.p2.hp)}<br>💀 相手HP: ${Math.max(0,isHost?game.p2.hp:game.p1.hp)}`;
}

function spawnConfetti(){const cs=['#fbbf24','#ef4444','#22c55e','#6366f1','#f97316','#ec4899'];for(let i=0;i<50;i++){setTimeout(()=>{const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=cs[Math.floor(Math.random()*cs.length)];c.style.width=(6+Math.random()*8)+'px';c.style.height=(6+Math.random()*8)+'px';c.style.borderRadius=Math.random()>.5?'50%':'2px';c.style.animationDuration=(2+Math.random()*2)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),4000)},i*40)}}

function rematch(){send({type:'rematch_req'});$('r-msg').textContent='リマッチを申し込み中...'}
function shareResult(){
  const w=$('r-title').textContent.includes('WIN'),d=$('r-title').textContent.includes('DRAW'),turns=game.turn-1;
  const txt=d?`🤝 /pvp で引き分け！${turns}ターンの死闘\n\n挑戦しよう👇`:w?`🏆 /pvp で勝利！${turns}ターンで撃破💪\n\n挑戦者求む👇`:`💀 /pvp で敗北... ${turns}ターン粘ったけど\n\nリベンジ相手募集👇`;
  const full=txt+`\nhttps://pvp-game-rho.vercel.app`;
  if(navigator.clipboard)navigator.clipboard.writeText(full).then(()=>alert('コピーしました！Xに貼り付けよう！'));
  else prompt('コピー:',full);
}
function backToLobby(){cleanup();show('lobby');$('conn').style.display='none'}

// Keys
document.addEventListener('keydown',e=>{
  if($('battle').classList.contains('active')){switch(e.key){case'1':pick('attack');break;case'2':pick('heavy');break;case'3':pick('defend');break;case'4':pick('heal');break}}
  if($('lobby').classList.contains('active')&&e.key==='Enter'){if($('join-row').classList.contains('show'))joinRoom();else quickMatch()}
});
$('room-input').addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase()});
</script>
